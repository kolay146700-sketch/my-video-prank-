<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #111; color: white; padding-top: 100px; }
        button { padding: 12px 24px; margin: 10px; font-size: 18px; border-radius: 20px; border: none; cursor: pointer; }
        .yes { background: #ff8c00; color: white; }
        .no { background: #555; color: white; }
        .video-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <h2>ငါနဲ့အတူ Halloween ပွဲဆင်နွှဲမလား?</h2>
    <button class="yes" onclick="playVideo()">Si (ဟုတ်ကဲ့)</button>
    <button class="no" onclick="playVideo()">No (ဟင့်အင်း)</button>

    <div class="video-container" id="vidBox">
        <video id="myVideo" src="Screenrecorder-2026-06-02-16-01-14-160.mp4" controls autoplay></video>
    </div>

    <script>
        function playVideo() {
            document.getElementById('vidBox').style.display = 'block';
            document.getElementById('myVideo').play();
        }
    </script>

</body>
</html>
